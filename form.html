<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form action="#" method="post">

        <label for="fullname">Full Name</label> <br>
        <input type="name" id="name" name="fullname" placeholder="" required> <br><br>
        
        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" placeholder="" required><br><br>
        
        <label for="phone">Phone Number</label><br>
        <input type="phone" id="number" name="phone" placeholder="" required><br><br>

        <label for="gender">Gender</label><br>
        <label for="male">Male</label>
         <input type="radio" id="male" name="gender"  value="Male" placeholder="" required>
         <label for="female">Female</label>
         <input type="radio" id="female" name="gender"  value="Female" placeholder="" required>
         <label for="other">Other</label>
         <input type="radio" id="other" name="gender"  value="Other" placeholder="" required> <br><br>

           

        <label for="dob">Date of birth</label> <br>
        <input type="date" id="dob" name="dob" placeholder="" required> <br><br>    


        <label for="Password">Password</label> <br>
        <input type="password" id="password" name="password" placeholder="" required> <br><br>    

        <label for="Password">Confirm Password</label> <br>
        <input type="password" id="password" name="password" placeholder="" required> <br><br> 

        <label for="Address">Adress</label> <br>
        <input type="address" id="address" name="address" placeholder="" required> <br><br> 
        
        
<label for="Dept">Department Background</label> <br><br>
     <select name="dept" id="dept">
                <option  value="cse">CSE</option>
                <option  value="bba">BBA</option>
                <option  value="bmba">BMBA</option>
            </select><br><br>

            <button type="submit">Submit</button>
    </form>
   

    
</body>
</html>
